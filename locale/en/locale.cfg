[technology-description]
industrial-module=Pushes machinery beyond standards, increasing output through intensified industrial operation. Ineffective in purely electric systems.
industrial-module-2=Further increases output by sustaining heavily overloaded industrial systems.
industrial-module-3=Maintains relentless, maximum-output operation, forcing industrial systems to perform at their absolute limits.
hydraulic-automation=Enables machines powered by hydraulic pressure, allowing industrial automation without reliance on electricity.
rubber=Enables processing of heavy oil residues into synthetic rubber for industrial applications and hydraulic systems.
hydraulic-petrochemistry=Unlocks the hydraulic petrochemical plant, enabling high-pressure oil processing, cracking of residual fractions, and production of advanced fuels such as naphtha and gasoline.

